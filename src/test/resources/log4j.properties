# ============================================================
# Log4j Properties - converted from logback.backup
# ============================================================

# Root logger
log4j.rootLogger=INFO, CONSOLE

# ============================================================
# Appenders
# ============================================================

# Console Appender
log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout
log4j.appender.CONSOLE.layout.ConversionPattern=%d{HH:mm:ss.SSS} [%t] %-5p %c{36} - %m%n

# File Appender
log4j.appender.FILE=org.apache.log4j.FileAppender
log4j.appender.FILE.File=target/test-logs/ktestify-tests.log
log4j.appender.FILE.Append=false
log4j.appender.FILE.layout=org.apache.log4j.PatternLayout
log4j.appender.FILE.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p %c{50} - %m%n

# ============================================================
# Loggers
# ============================================================

# Ktestify framework - DEBUG to CONSOLE + FILE
log4j.logger.io.github.ktestify=DEBUG, CONSOLE
log4j.additivity.io.github.ktestify=false

# Testcontainers - reduce verbosity
log4j.logger.org.testcontainers=INFO, CONSOLE
log4j.additivity.org.testcontainers=false

log4j.logger.tc=INFO, CONSOLE
log4j.additivity.tc=false

log4j.logger.com.github.dockerjava=WARN, CONSOLE
log4j.additivity.com.github.dockerjava=false

# Kafka client - reduce verbosity
log4j.logger.org.apache.kafka=WARN, CONSOLE
log4j.additivity.org.apache.kafka=false

log4j.logger.org.apache.kafka.clients.consumer=WARN, CONSOLE
log4j.additivity.org.apache.kafka.clients.consumer=false

log4j.logger.org.apache.kafka.clients.producer=WARN, CONSOLE
log4j.additivity.org.apache.kafka.clients.producer=false

log4j.logger.org.apache.kafka.clients.admin=WARN, CONSOLE
log4j.additivity.org.apache.kafka.clients.admin=false

# Avro / Schema Registry
log4j.logger.io.confluent=WARN, CONSOLE
log4j.additivity.io.confluent=false