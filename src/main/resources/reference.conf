# ktestify Default Configuration
# ================================
# This file contains the default configuration values for ktestify.
# Users can override these values in their application.conf file.
#
# Environment variables can be used with ${?ENV_VAR} syntax.
# The ? makes the substitution optional (won't fail if not set).

ktestify {

  # Kafka Configuration
  # ===================
  kafka {
    # Bootstrap servers - comma-separated list
    # Override with KAFKA_BOOTSTRAP_SERVERS environment variable
    bootstrap-servers = "localhost:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}

    # Default topic namespace prepended to all topic names as "<namespace>.<topicName>".
    # Leave blank for no namespace. Can be overridden per-scenario with 'Given namespace'.
    topic-namespace = ""
    topic-namespace = ${?KTESTIFY_TOPIC_NAMESPACE}

    # Security protocol: PLAINTEXT, SSL, SASL_PLAINTEXT, SASL_SSL
    security-protocol = "PLAINTEXT"
    security-protocol = ${?KAFKA_SECURITY_PROTOCOL}

    # Producer defaults
    producer {
      acks = "all"
      retries = 3
      batch-size = 16384
      linger-ms = 1ms
      buffer-memory = 33554432
      key-serializer = "org.apache.kafka.common.serialization.StringSerializer"
      value-serializer = "org.apache.kafka.common.serialization.StringSerializer"
    }

    # Consumer defaults
    consumer {
      group-id = "ktestify-consumer-group"
      group-id = ${?KAFKA_CONSUMER_GROUP_ID}
      enable-auto-commit = false
      auto-offset-reset = "earliest"
      session-timeout = 30s
      heartbeat-interval = 10s
      max-poll-records = 500
      key-deserializer = "org.apache.kafka.common.serialization.StringDeserializer"
      value-deserializer = "org.apache.kafka.common.serialization.StringDeserializer"
    }

    # Security settings (optional)
    security {
      # SASL mechanism: PLAIN, SCRAM-SHA-256, SCRAM-SHA-512, OAUTHBEARER
      sasl-mechanism = ""
      sasl-mechanism = ${?KAFKA_SASL_MECHANISM}

      # JAAS configuration string
      sasl-jaas-config = ""
      sasl-jaas-config = ${?KAFKA_SASL_JAAS_CONFIG}

      # SSL truststore
      ssl-truststore-location = ""
      ssl-truststore-location = ${?KAFKA_SSL_TRUSTSTORE_LOCATION}
      ssl-truststore-password = ""
      ssl-truststore-password = ${?KAFKA_SSL_TRUSTSTORE_PASSWORD}

      # SSL keystore (for mutual TLS)
      ssl-keystore-location = ""
      ssl-keystore-location = ${?KAFKA_SSL_KEYSTORE_LOCATION}
      ssl-keystore-password = ""
      ssl-keystore-password = ${?KAFKA_SSL_KEYSTORE_PASSWORD}
      ssl-key-password = ""
      ssl-key-password = ${?KAFKA_SSL_KEY_PASSWORD}
    }
  }

  # Schema Registry Configuration
  # =============================
  schema-registry {
    url = "http://localhost:8081"
    url = ${?SCHEMA_REGISTRY_URL}

    cache-capacity = 50
    auto-register-schemas = true
    compatibility-level = "BACKWARD"

    # Authentication
    auth {
      # Credentials source: USER_INFO, URL, SASL_INHERIT
      basic-auth-credentials-source = ""
      basic-auth-credentials-source = ${?SCHEMA_REGISTRY_BASIC_AUTH_CREDENTIALS_SOURCE}

      # Format: username:password
      basic-auth-user-info = ""
      basic-auth-user-info = ${?SCHEMA_REGISTRY_BASIC_AUTH_USER_INFO}
    }

    # SSL settings
    ssl {
      truststore-location = ""
      truststore-location = ${?SCHEMA_REGISTRY_SSL_TRUSTSTORE_LOCATION}
      truststore-password = ""
      truststore-password = ${?SCHEMA_REGISTRY_SSL_TRUSTSTORE_PASSWORD}
      keystore-location = ""
      keystore-location = ${?SCHEMA_REGISTRY_SSL_KEYSTORE_LOCATION}
      keystore-password = ""
      keystore-password = ${?SCHEMA_REGISTRY_SSL_KEYSTORE_PASSWORD}
    }
  }

  # Framework Configuration
  # =======================
  framework {
    # Timeout settings
    timeouts {
      # Default timeout for consumer read operations
      default-read-timeout = 10s
      default-read-timeout = ${?KTESTIFY_DEFAULT_READ_TIMEOUT}

      # Delta time for seeking to offsets (how far back to look)
      consumer-delta-time = 20s
      consumer-delta-time = ${?KTESTIFY_CONSUMER_DELTA_TIME}

      # Polling interval for consumer loops
      poll-interval = 100ms

      # Buffer time for waiting operations
      buffer-time = 5s
    }

    # Directory settings (optional)
    directories {
      # Base directory for test assets (payloads, expected outputs)
      assets = ""
      assets = ${?KTESTIFY_ASSETS_DIR}

      # Directory for test output/reports
      output = ""
      output = ${?KTESTIFY_OUTPUT_DIR}
    }

    # Execution settings
    execution {
      # Enable snapshot mode for updating expected outputs
      snapshot-mode = false
      snapshot-mode = ${?KTESTIFY_SNAPSHOT_MODE}

      # Strict matching (fail on any mismatch)
      strict-matching = true

      # Maximum retries for transient failures
      max-retries = 3
    }

    # Reporting settings
    reporting {
      enabled = true
      # Format: html, json, cucumber
      format = "html"
      # Directory for test output/reports
      output = "src/target/reports/report.html"
      output = ${?KTESTIFY_OUTPUT_DIR}
    }
  }

  # Logging Configuration
  # =====================
  # Log levels applied programmatically at KtestifyConfig load time via Log4j2 Configurator.
  # These override the static defaults in log4j2.properties at runtime.
  #
  # Valid values: TRACE, DEBUG, INFO, WARN, ERROR, OFF
  #
  # Each key also has a corresponding environment variable override.
  logging {
    # io.github.ktestify.* — the framework itself
    level              = "DEBUG"
    level              = ${?KTESTIFY_LOG_LEVEL}

    # Root logger (everything not matched by a specific logger below)
    root-level         = "INFO"
    root-level         = ${?KTESTIFY_ROOT_LOG_LEVEL}

    # Apache Kafka client libraries
    kafka-level        = "WARN"
    kafka-level        = ${?KTESTIFY_KAFKA_LOG_LEVEL}

    # Testcontainers + Docker Java client
    testcontainers-level = "INFO"
    testcontainers-level  = ${?KTESTIFY_TC_LOG_LEVEL}

    # Confluent Schema Registry / Avro
    confluent-level    = "WARN"
    confluent-level    = ${?KTESTIFY_CONFLUENT_LOG_LEVEL}
  }
}

