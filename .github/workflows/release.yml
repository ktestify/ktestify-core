# ============================================================
# Release — Publish ktestify-core to Maven Central
#
# Select a bump type — the reusable workflow calculates
# the release version and next SNAPSHOT automatically.
# ============================================================
name: Release

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
    inputs:
      bump-type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - bugfix
          - minor
          - major
          - release-candidate
      dry-run:
        description: "Dry run — build & sign but skip publish, tag & GitHub Release"
        required: false
        default: false
        type: boolean

jobs:
  release:
    uses: ktestify/.github/.github/workflows/reusable-maven-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type }}
      dry-run: ${{ inputs.dry-run }}
      release-name-prefix: "ktestify-core"
      update-readme-badge: true
      release-artifacts: |
        target/ktestify-core.jar
        target/ktestify-core-sources.jar
        target/ktestify-core-javadoc.jar
    secrets:
      KTESTIFY_CHANGELOG_PAT: ${{ secrets.KTESTIFY_CHANGELOG_PAT }}
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
